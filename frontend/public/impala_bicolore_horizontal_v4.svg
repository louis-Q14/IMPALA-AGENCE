<svg width="100%" viewBox="0 0 680 140" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo IMPALA-AGENCE bicolore horizontal aligné</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Carré bicolore IA à la hauteur exacte du texte IMPALA-AGENCE, côte à côte</desc>

<defs>

</defs>

<!-- Carré bicolore : hauteur 32px = exactement la cap-height du texte 44px -->
<rect x="40" y="63" width="32" height="32" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="72" y="63" width="32" height="32" fill="none" stroke="var(--color-text-primary)" stroke-width="1.5" style="fill:none;stroke:rgb(250, 249, 245);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="56" y="91" text-anchor="middle" font-size="28" font-weight="700" fill="var(--color-background-primary)" letter-spacing="-0.05em" style="fill:rgb(48, 48, 46);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">I</text>
<text x="88" y="91" text-anchor="middle" font-size="28" font-weight="700" fill="var(--color-text-primary)" letter-spacing="-0.05em" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:28px;font-weight:700;text-anchor:middle;dominant-baseline:auto">A</text>

<!-- Texte IMPALA-AGENCE : baseline à y=95, cap-height ≈ 32px (de y=63 à y=95) -->
<text x="120" y="95" font-size="44" font-weight="700" letter-spacing="0.02em" fill="var(--color-text-primary)" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:44px;font-weight:700;text-anchor:start;dominant-baseline:auto">IMPALA-AGENCE</text>

</svg>