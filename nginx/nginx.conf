# Config Nginx production — HTTPS + Let's Encrypt
# Déployée après obtention du certificat SSL.

# Limite les méthodes et tailles pour la sécurité
map $request_method $not_allowed_method {
    default 0;
    TRACE   1;
    TRACK   1;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name impala-agence.com www.impala-agence.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://impala-agence.com$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl;
    server_name www.impala-agence.com;

    ssl_certificate     /etc/letsencrypt/live/impala-agence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impala-agence.com/privkey.pem;

    return 301 https://impala-agence.com$request_uri;
}

# Application principale
server {
    listen 443 ssl;
    server_name impala-agence.com;

    ssl_certificate     /etc/letsencrypt/live/impala-agence.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impala-agence.com/privkey.pem;

    # Paramètres SSL modernes
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Taille max upload (photos d'annonces)
    client_max_body_size 50M;

    # API backend — /api/*
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Fichiers uploadés — /uploads/*
    location /uploads/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # Frontend Next.js — tout le reste
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
