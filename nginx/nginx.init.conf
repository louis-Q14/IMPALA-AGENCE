# Config Nginx initiale — HTTP uniquement (pour obtenir le certificat Let's Encrypt)
# Utilisée pendant la phase 1 du déploiement, avant d'avoir le certificat SSL.

server {
    listen 80;
    server_name impala-agence.com www.impala-agence.com;

    # Challenge Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'IMPALA-AGENCE - Initialisation SSL en cours...';
        add_header Content-Type text/plain;
    }
}
